metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "sqlite"

# Single-node layout. Secrets are NOT stored here: rpc_secret, admin_token,
# and metrics_token come from the GARAGE_RPC_SECRET, GARAGE_ADMIN_TOKEN, and
# GARAGE_METRICS_TOKEN environment variables set in docker compose.
replication_factor = 1

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "garage:3901"

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"
root_domain = ".s3.garage.localhost"

[s3_web]
bind_addr = "[::]:3902"
root_domain = ".web.garage.localhost"
index = "index.html"

[admin]
api_bind_addr = "[::]:3903"
