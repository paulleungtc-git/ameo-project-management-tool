services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ameo}
      POSTGRES_USER: ${POSTGRES_USER:-ameo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ameo_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  garage:
    image: ${GARAGE_IMAGE:-dxflrs/garage:v1.1.0}
    restart: unless-stopped
    command: ["/garage", "server"]
    ports:
      - "${GARAGE_S3_PORT:-3900}:3900"
      - "${GARAGE_RPC_PORT:-3901}:3901"
      - "${GARAGE_WEB_PORT:-3902}:3902"
      - "${GARAGE_ADMIN_PORT:-3903}:3903"
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 15s
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ameo:ameo_dev_password@postgres:5432/ameo}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://192.168.210.249:3001,http://localhost:3001,http://127.0.0.1:3001}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://garage:3900}
      S3_BUCKET: ${S3_BUCKET:-attachments}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-GK414d454f4445564143434553}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f}
      S3_REGION: ${S3_REGION:-garage}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      ATTACHMENT_MAX_BYTES: ${ATTACHMENT_MAX_BYTES:-10485760}
      ATTACHMENT_ALLOWED_CONTENT_TYPES: ${ATTACHMENT_ALLOWED_CONTENT_TYPES:-image/png,image/jpeg,image/gif,image/webp,application/pdf,text/plain,text/markdown,text/csv,application/zip}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      garage:
        condition: service_started

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE is required}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://192.168.210.249:8000}
    ports:
      - "${WEB_PORT:-3001}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  garage_meta:
  garage_data:
